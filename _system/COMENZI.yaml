# Catalog comenzi Trainity · machine-readable
# Versiune: V40 · 28 mai 2026
#
# Fiecare comandă are:
#   sintaxa        Forma canonică
#   aliasuri       Alte forme acceptate
#   intentie       Ce vrea ARHITECT să se întâmple
#   pre_check      Verificări înainte de execuție
#   executie       Pașii reali
#   post_check     Verificări după execuție
#   atinge         Fișiere modificate
#   raport         Ce raportez în chat după
#   confirmare     Dacă cer confirmare explicită
#   referinta_doc  Detalii umane în care document
#
# Acest fișier ESTE catalogul. Claude îl citește on-demand
# pentru a executa corect comenzile.
#
# V40: actualizat la versiune unică per construcție (V39) + workflow
# OneDrive (NU Git). Backup automat înainte de operațiuni distructive
# (regula V1 din CLAUDE.md). Snapshot V{N} la consolideaza_brain (V2).

comenzi:

  # ─── GENERARE ────────────────────────────────────────────

  - id: status
    sintaxa: "status"
    aliasuri: ["arata status", "status sistem", "where are we"]
    intentie: "Raportez stare completă sistem"
    pre_check: []
    executie:
      - "Citesc STARE-CURENTA.md"
      - "Rulez _system/generatoare/audit_sync.py"
    post_check: []
    atinge: []
    raport: "Versiune V{N} | Construcții livrate X/20 | Audit: {zero drift / drift detectat} | Pe agenda: {primul item}"
    confirmare: false
    referinta_doc: "_system/03-COMENZI-OPERATIONALE.md"

  - id: genereaza_constructie
    sintaxa: "genereaza C{NN}"
    aliasuri: ["genereaza constructia {NN}", "creeaza C{NN}", "genereaza C{NN} {slug}"]
    intentie: "Prima generare a construcției NN"
    pre_check:
      - "SPEC C{NN} înghețat narativ în _system/arhiva/SISTEM_TRAINITY-versiuni.md (R-V03.55)"
      - "IDENTITATE_TEHNICA C{NN} completă în _system/referinte/IDENTITATE-TEHNICA.md (R-V03.40 / L142)"
      - "Prompt-label specific construcției NU clone (L144)"
      - "C{NN-1} predată cu sumă conservată (R-V02.14)"
      - "Rulez _system/generatoare/pre_generation_check.py {NN} → exit 0"
    executie:
      - "Citesc _template/ ca matriță (R-V03.54)"
      - "Aplic COPY+MODIFY pe cele 4 HTML-uri (text/identitate per CNN, CSS/JS intacte)"
      - "Generez Date_MASTER-C{NN}.xlsx din _system/referinte/Date_MASTER-initial.xlsx + SPEC"
      - "Generez Creativ-Excel-{NN}-{slug}.txt"
      - "Generez FILM-Excel-{NN}-{slug}.docx"
      - "Copiez 12 imagini placeholder din _template/assets/ în c{NN}/assets/"
      - "Scriu toate în c{NN}/"
    post_check:
      - "audit_sync.py → ZERO DRIFT (R-V03.63)"
      - "gate_v20.py {NN} c{NN}/ _template/ → PASS"
    atinge:
      - "c{NN}/ (7 artefacte + assets/)"
    raport: "C{NN} generată. Zero drift. Gate PASS. Imagini placeholder (regenerează cu Banana 2 pentru axă)."
    confirmare: false
    referinta_doc: "_system/05-WORKFLOW-PER-SCENARIU.md scenariu 1"

  - id: regenereaza_de_la_zero
    sintaxa: "regenereaza C{NN} de la zero"
    aliasuri: ["recreaza C{NN}", "rebuild C{NN}"]
    intentie: "DISTRUCTIVE: suprascrie c{NN}/. Rollback prin backup auto sau OneDrive Version History."
    pre_check:
      - "ARHITECT confirmă explicit (cerere distructivă)"
    executie:
      - "BACKUP AUTO (regula V1): copiez c{NN}/ → c{NN}_BACKUP_AAAALLZZ_pre-regen/"
      - "ŞTERG c{NN}/"
      - "Aplic flow genereaza_constructie de la zero"
    post_check:
      - "audit_sync.py → ZERO DRIFT"
      - "gate_v20.py PASS"
      - "Backup c{NN}_BACKUP_AAAALLZZ_pre-regen/ vizibil"
    atinge:
      - "c{NN}/ (suprascris complet)"
      - "c{NN}_BACKUP_AAAALLZZ_pre-regen/ (creat)"
    raport: "C{NN} regenerată de la zero. Backup la c{NN}_BACKUP_AAAALLZZ_pre-regen/. OneDrive sync în background. Dacă vrei rollback: ștergi c{NN}/ și redenumești backup-ul."
    confirmare: true
    confirmare_text: "Atenție: voi suprascrie c{NN}/ complet. Creez backup automat c{NN}_BACKUP_AAAALLZZ_pre-regen/. Confirmi? (da/nu)"

  # ─── EDITARE & PATCH ─────────────────────────────────────

  - id: aplica_fix
    sintaxa: "aplica fix [descriere]"
    aliasuri: ["bug: [desc]. Aplică", "patch [descriere]"]
    intentie: "Patch script peste TOATE construcțiile c01-cN."
    pre_check:
      - "ARHITECT descrie clar bug-ul"
      - "Citesc fișier reprezentativ pentru localizare"
      - "Estimez câte fișiere atinge patch-ul"
    executie:
      - "Propun fix-ul concret cu citate exacte"
      - "ARHITECT confirmă"
      - "Dacă patch atinge >3 fișiere: BACKUP AUTO (regula V1) pe construcțiile afectate (cNN/ → cNN_BACKUP_AAAALLZZ_pre-fix/)"
      - "Scriu rețetă patch YAML în _system/patch_recipes/R-V03.X-{slug}.yaml"
      - "Rulez patch_runner.py rețetă pe toate c*/"
    post_check:
      - "audit_sync.py → ZERO DRIFT (cu noul detector adăugat)"
      - "gate_v20 PASS pe construcțiile afectate"
    atinge:
      - "c*/{fișiere afectate}"
      - "c*_BACKUP_AAAALLZZ_pre-fix/ (dacă >3 fișiere)"
      - "_system/patch_recipes/R-V03.X-{slug}.yaml (nou)"
      - "_system/01-REGULI-ACTIVE.md (regulă nouă)"
      - "_system/generatoare/audit_sync.py (detector nou)"
    raport: "Fix aplicat pe C01-C{ultima}. Regula R-V03.X codificată. {Backup creat la cNN_BACKUP... / Modificare mică, fără backup}. OneDrive sync."
    confirmare: true

  - id: regula_noua
    sintaxa: "regula noua R-V03.X: [descriere]"
    aliasuri: ["codifica R-V03.X", "noua regula"]
    intentie: "Codific o regulă nouă fără să o aplic încă"
    pre_check: []
    executie:
      - "Adaug în _system/01-REGULI-ACTIVE.md cu status PROPUSĂ"
      - "Scriu detector în _system/generatoare/audit_sync.py (dacă fișier-bazată)"
      - "Scriu rețetă patch în _system/patch_recipes/ (dacă patch-abilă)"
    post_check: []
    atinge:
      - "_system/01-REGULI-ACTIVE.md"
      - "_system/generatoare/audit_sync.py (dacă fișier-bazată)"
      - "_system/patch_recipes/R-V03.X-{slug}.yaml (dacă patch-abilă)"
    raport: "R-V03.X codificată ca PROPUSĂ. Aplic cu 'aplica R-V03.X' când ești gata."
    confirmare: false

  # ─── AUDIT & VERIFICARE ──────────────────────────────────

  - id: verifica_sincronizare
    sintaxa: "verifica sincronizare"
    aliasuri: ["audit", "rulează audit", "verifica drift"]
    intentie: "Rulez audit empiric exhaustiv"
    pre_check: []
    executie:
      - "python _system/generatoare/audit_sync.py"
    post_check: []
    atinge: []
    raport: "Tabel drift complet. Dacă DRIFT > 0 sau ERR > 0, propun pașii de reparare."
    confirmare: false

  - id: verifica_constructie
    sintaxa: "verifica C{NN}"
    aliasuri: ["audit C{NN}", "gate C{NN}"]
    intentie: "Audit detaliat pentru o construcție specifică"
    pre_check: []
    executie:
      - "audit_sync.py (filtrat pe c{NN} prin grep raport)"
      - "gate_v20.py {NN} c{NN}/ _template/"
    post_check: []
    atinge: []
    raport: "Status C{NN}: {drift/PASS}. Reguli aplicate: {lista}. Erori detectate: {lista}."
    confirmare: false

  - id: compara_versiuni
    sintaxa: "compara C{NN} cu versiunea anterioara"
    aliasuri: ["diff C{NN}", "ce am modificat in C{NN}"]
    intentie: "Diff între c{NN}/ actual și fie backup local, fie OneDrive Version History"
    pre_check: []
    executie:
      - "Identific surse de comparat: (a) c{NN}_BACKUP_AAAALLZZ_*/ locale, (b) snapshot _system/snapshots/V{N}/c{NN}/, (c) OneDrive Version History (per fișier)"
      - "Diff line-by-line pe fișiere comparabile (HTML, MD, txt)"
      - "Sumarizez diferențele semantic"
    post_check: []
    atinge: []
    raport: "C{NN} diff vs {sursă comparată}: {sumar modificări}. Pentru istoric per fișier, OneDrive Version History (drept-click → Version History în Explorer)."
    confirmare: false

  # ─── IMAGINI & ASSETS ────────────────────────────────────

  - id: poza_noua_constructie
    sintaxa: "pentru C{NN} poza noua exec-stage-{X}"
    aliasuri: ["inlocuieste poza exec-stage-{X} la C{NN}"]
    intentie: "Înlocuiesc imagine specifică unei construcții"
    pre_check:
      - "Pozele atașate sau prezente local"
    executie:
      - "Salvez pozele în c{NN}/assets/exec-stage-{X}.{jpg,png}"
      - "Encode base64"
      - "Înlocuiesc în c{NN}/HTML-Video-Excel-{NN}-{slug}.html și HTML-Editor-Video"
    post_check:
      - "audit_sync.py → ZERO DRIFT"
    atinge:
      - "c{NN}/assets/exec-stage-{X}.{jpg,png}"
      - "c{NN}/HTML-Video-Excel-*.html"
      - "c{NN}/HTML-Editor-Video-Excel-*.html"
    raport: "Imagine nouă exec-stage-{X} în C{NN}. OneDrive sync în background."
    confirmare: true

  - id: poza_noua_toate
    sintaxa: "aceasta poza inlocuieste exec-stage-{X} la toate"
    aliasuri: ["update brand poza exec-stage-{X}"]
    intentie: "Înlocuiesc imagine în toate construcțiile (brand-wide)"
    pre_check:
      - "ARHITECT confirmă (impact pe toate)"
    executie:
      - "Pentru fiecare c{NN}/ existent: salvez în c{NN}/assets/exec-stage-{X}.{jpg,png}"
      - "Re-encode base64"
      - "Aplic peste toate c*/HTML-Video-*.html + HTML-Editor-Video"
    post_check:
      - "audit_sync.py → ZERO DRIFT"
    atinge:
      - "c*/assets/exec-stage-{X}.*"
      - "c*/HTML-Video-*.html"
      - "c*/HTML-Editor-Video-*.html"
    raport: "Imagine brand exec-stage-{X} actualizată în toate construcțiile. OneDrive sync în background."
    confirmare: true

  # ─── META-SISTEM ─────────────────────────────────────────

  - id: consolideaza_brain
    sintaxa: "consolideaza brain"
    aliasuri: ["checkout brain", "consolidare V{N}"]
    intentie: "Sumarizare sesiune + update STARE-CURENTA + SNAPSHOT AUTO V{N}"
    pre_check: []
    executie:
      - "Sumar sesiune: ce s-a făcut, ce decizii, ce lecții"
      - "Update STARE-CURENTA.md (versiune nouă V{N})"
      - "Update _system/arhiva/brain-evolutia-V01-V38.md cu sumar V{N}"
      - "audit_sync.py → confirm ZERO DRIFT pre-consolidare"
      - "SNAPSHOT AUTO (regula V2): copiez c01..c{ultima} → _system/snapshots/V{N}_AAAALLZZ/"
      - "Generez _system/snapshots/V{N}_AAAALLZZ/manifest.md cu sumar V{N}"
    post_check:
      - "Snapshot V{N} vizibil + manifest.md prezent"
    atinge:
      - "STARE-CURENTA.md"
      - "_system/arhiva/brain-evolutia-V01-V38.md"
      - "_system/snapshots/V{N}_AAAALLZZ/ (creat, conține copii cNN/ + manifest)"
    raport: "Consolidare V{N} finalizată. Snapshot oficial salvat la _system/snapshots/V{N}_AAAALLZZ/. OneDrive sync în background. Pe agenda: {primul item}."
    confirmare: false

  - id: snapshot_versiune
    sintaxa: "snapshot V{N}"
    aliasuri: ["fa snapshot V{N}", "salveaza snapshot V{N}"]
    intentie: "Creez snapshot oficial al stării curente (regula V2, manual)"
    pre_check:
      - "audit_sync.py → ZERO DRIFT (snapshot doar pe stare validă)"
    executie:
      - "Determină data AAAALLZZ"
      - "Creez folderul _system/snapshots/V{N}_AAAALLZZ/"
      - "Copiez c01/, c02/, ..., c{ultima}/ în snapshot"
      - "Copiez STARE-CURENTA.md în snapshot ca state-at-snapshot.md"
      - "Generez manifest.md cu: versiunea V{N}, data, ce construcții incluse, schimbări vs V{N-1}"
    post_check:
      - "Snapshot vizibil + manifest.md prezent"
    atinge:
      - "_system/snapshots/V{N}_AAAALLZZ/ (creat)"
    raport: "Snapshot V{N} salvat la _system/snapshots/V{N}_AAAALLZZ/. OneDrive sync în background. Folosește pentru rollback la V{N} dacă ulterior greșim ceva."
    confirmare: false

  - id: help
    sintaxa: "help"
    aliasuri: ["ce comenzi am", "lista comenzi", "?"]
    intentie: "Listez comenzile disponibile cu sintaxa și efectul"
    pre_check: []
    executie:
      - "Citesc acest fișier (COMENZI.yaml)"
      - "Format tabel: comandă | intenție | confirmare?"
    post_check: []
    atinge: []
    raport: "Tabel comenzi disponibile + indicator pentru cele care cer confirmare"
    confirmare: false

  # ─── NAVIGARE ─────────────────────────────────────────────

  - id: unde_e
    sintaxa: "unde e {concept}"
    aliasuri: ["caut {concept}", "unde definita {concept}"]
    intentie: "Caut un concept în sistem"
    pre_check: []
    executie:
      - "Citesc _system/INDEX-CAUTARE.md"
      - "Caut termenul"
      - "Întorc pointer-ul exact (document + secțiune)"
    post_check: []
    atinge: []
    raport: "{concept} definit în: {lista locații}"
    confirmare: false

# ─── REGULI APLICARE COMENZI ────────────────────────────────

reguli_aplicare:

  intentie_neclara:
    - "Dacă ARHITECT scrie ceva care nu match exact o comandă, identific intenția cea mai apropiată"
    - "Confirm cu ARHITECT: 'Înțeleg ca: {comandă X}. Confirmi?'"
    - "Niciodată execuție silentioasă pe intenție ambiguă"

  comenzi_distructive:
    - "Cer confirmare explicită"
    - "Niciodată suprascriu fără 'da' explicit"
    - "BACKUP AUTO (regula V1) pentru orice operațiune ce suprascrie folder sau atinge >3 fișiere"
    - "Format backup: cNN_BACKUP_AAAALLZZ_pre-{operatiune}/"
    - "OneDrive Version History per fișier rămâne fallback pentru pierderi mici"

  cereri_paralele:
    - "Dacă ARHITECT cere 2 comenzi simultan, le execut în serie cu raport per fiecare"
    - "NU paralelizez execuții care modifică aceleași fișiere"

  rate_limit_audit:
    - "audit_sync.py NU rulează la fiecare modificare mică"
    - "Rulează automat doar la final de batch (după ultima modificare)"
    - "ARHITECT poate cere oricând 'verifica sincronizare' pentru audit ad-hoc"

# ─── VERSIONARE ACESTUI FIȘIER ──────────────────────────────

metadata:
  versiune: V40
  data: 2026-05-28
  format: YAML 1.2
  citit_de: ["Claude (motor)", "ARHITECT (referință)"]
  modificat_de: "Claude la fiecare codificare comenzi noi"
  changelog_v40: "Colaps canonic/editat în comenzi (genereaza, aplica_fix, regenereaza, poze). Eliminat refa_canonic + aplica_si_pe_canonic (nu mai au sens). compara_canonic_editat → compara_versiuni (folosește OneDrive Version History + snapshots locale). Adăugat pre_generation_check.py în pre_check pentru genereaza. Adăugat BACKUP AUTO (regula V1) la regenereaza + aplica_fix >3 fișiere. Adăugat SNAPSHOT AUTO (regula V2) la consolideaza_brain. Adăugat comanda separată snapshot_versiune. Eliminate toate referințele Git → OneDrive."
